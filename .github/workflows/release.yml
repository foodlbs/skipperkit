name: Release

# Pushing a version tag (e.g. v0.1.0) builds a signed release APK and attaches
# it to a GitHub Release. Signing material comes from repository secrets
# (RELEASE_KEYSTORE_B64 + passwords); the keystore itself is never committed.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # All actions SHA-pinned: this job holds the release signing keystore, so a
      # force-pushed action tag would be a supply-chain attack on every install.
      # actions/checkout@v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up JDK 17
        # actions/setup-java@v5
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        # android-actions/setup-android@v4
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Set up Gradle (with caching)
        # gradle/actions/setup-gradle@v6
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Materialize signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > skipperkit-release.jks
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/skipperkit-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Test and build signed release APK
        # No --stacktrace here: verbose failure output isn't worth any chance of
        # echoing environment details in a job that holds signing material.
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest assembleRelease

      - name: Clean up signing material
        if: always()
        run: rm -f skipperkit-release.jks keystore.properties

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="skipperkit-${GITHUB_REF_NAME}.apk"
          mv app/build/outputs/apk/release/app-release.apk "$APK"
          sha256sum "$APK" > "$APK.sha256"
          gh release create "$GITHUB_REF_NAME" "$APK" "$APK.sha256" \
            --title "SkipperKit $GITHUB_REF_NAME" \
            --generate-notes
